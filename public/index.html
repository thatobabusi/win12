<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 12 Online</title>
    <!-- Boot order (matches reference win12 project):
         index.html -> boot.html (BIOS progress bar, ~2s, F2 -> bios.html)
                    -> desktop.html (login overlay -> desktop)
         boot_kernel.js drives the boot.html -> desktop.html redirect.

         The redirect below is GUARDED to only run at the top level. If a static
         host serves this page as a fallback for a missing path INSIDE an iframe
         (e.g. a broken same-origin embed), an unconditional redirect to boot.html
         loops forever (index -> boot -> fallback index -> boot -> ...). A meta
         refresh cannot be guarded, so it is intentionally omitted; the app
         requires JavaScript anyway. -->
    <style>
        html, body { margin: 0; padding: 0; background: #000; }
    </style>
</head>
<body>
    <script>
        // Enter the boot sequence as a full-page navigation only. When framed
        // (window.top !== window.self) do nothing, to avoid the fallback loop.
        // replace() keeps this entry page out of the back-history.
        if (window.top === window.self) {
            window.location.replace('../src/boot.html');
        }
    </script>
</body>
</html>
