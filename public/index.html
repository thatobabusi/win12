<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 12 Online</title>
    <!-- Boot order (matches reference win12 project):
         index.html -> boot.html (BIOS progress bar, ~2s, F2 -> bios.html)
                    -> desktop.html (login overlay -> desktop)
         boot_kernel.js drives the boot.html -> desktop.html redirect.
         No iframe / no competing timer here, so the boot runs exactly once. -->
    <meta http-equiv="refresh" content="0; url=boot.html">
    <style>
        html, body { margin: 0; padding: 0; background: #000; }
    </style>
</head>
<body>
    <script>
        // Enter the boot sequence as a full-page navigation (not an iframe),
        // so boot_kernel.js controls progress and the redirect to the desktop.
        // replace() keeps this entry page out of the back-history.
        window.location.replace('boot.html');
    </script>
</body>
</html>
