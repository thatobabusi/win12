<svg viewBox="0 0 1920 1200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="softBlurDark">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" />
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="1920" height="1200" fill="#1d1d1f"/>

  <!-- Subtle dark gradient -->
  <defs>
    <linearGradient id="darkBgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#262628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1920" height="1200" fill="url(#darkBgGradient)"/>

  <!-- Minimalist calla lily on right side - dark mode -->
  <g opacity="0.25" transform="translate(1600, 300)">
    <!-- Stem -->
    <line x1="0" y1="0" x2="0" y2="400" stroke="#556b4a" stroke-width="3" stroke-linecap="round"/>

    <!-- Calla lily flower -->
    <path d="M 0 0 Q -40 -20 -50 -80 Q -45 -120 0 -130 Q 45 -120 50 -80 Q 40 -20 0 0"
          fill="none" stroke="#6d8660" stroke-width="2.5" filter="url(#softBlurDark)"/>
    <path d="M 0 0 Q -35 -15 -45 -75 Q -40 -110 0 -120 Q 40 -110 45 -75 Q 35 -15 0 0"
          fill="#4a6b42" opacity="0.4"/>
  </g>

  <!-- Minimalist leaf on left side - dark mode -->
  <g opacity="0.2" transform="translate(200, 400)">
    <!-- Stem -->
    <line x1="0" y1="0" x2="0" y2="350" stroke="#556b4a" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Leaf shape -->
    <path d="M 0 0 Q -45 10 -60 80 Q -50 130 0 150 Q 50 130 60 80 Q 45 10 0 0"
          fill="#506d4a" opacity="0.4"/>
    <path d="M 0 0 Q -45 10 -60 80 Q -50 130 0 150 Q 50 130 60 80 Q 45 10 0 0"
          fill="none" stroke="#6d8660" stroke-width="1.5" opacity="0.2"/>
  </g>

  <!-- Very subtle accent leaf in bottom right -->
  <g opacity="0.12" transform="translate(1700, 900)">
    <path d="M 0 0 Q -30 5 -40 50 Q -35 75 0 85 Q 35 75 40 50 Q 30 5 0 0"
          fill="#4a6b42" opacity="0.3"/>
  </g>

  <!-- Subtle top-left accent -->
  <g opacity="0.08" transform="translate(100, 150)">
    <circle cx="0" cy="0" r="80" fill="#506d4a"/>
  </g>
</svg>
