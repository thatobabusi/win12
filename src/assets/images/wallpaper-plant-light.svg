<svg viewBox="0 0 1920 1200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <!-- Clean white/light gray background -->
  <defs>
    <linearGradient id="bgClean" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f8f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1920" height="1200" fill="url(#bgClean)"/>

  <!-- Plant vase on left side with leaves -->
  <g transform="translate(300, 700)">
    <!-- Glass vase -->
    <ellipse cx="0" cy="-40" rx="45" ry="15" fill="none" stroke="#d0d0d0" stroke-width="1" opacity="0.6"/>
    <path d="M -40 -40 L -35 80 Q 0 95 35 80 L 40 -40" fill="none" stroke="#e0e0e0" stroke-width="2" opacity="0.4"/>
    <path d="M -38 -40 L -33 80 Q 0 92 33 80 L 38 -40" fill="none" stroke="#f5f5f5" stroke-width="1" opacity="0.8"/>

    <!-- Water inside vase -->
    <ellipse cx="0" cy="70" rx="32" ry="10" fill="#f0f8ff" opacity="0.3"/>

    <!-- Left leaf -->
    <path d="M -5 -20 Q -40 -10 -50 40 Q -45 70 -20 80"
          fill="none" stroke="#5a8c5a" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <path d="M -5 -20 Q -38 0 -48 50"
          fill="none" stroke="#7ab77a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Right leaf -->
    <path d="M 8 -15 Q 45 5 55 50 Q 50 75 25 85"
          fill="none" stroke="#6b9b6b" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    <path d="M 8 -15 Q 42 15 52 60"
          fill="none" stroke="#8cc88c" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Center leaf -->
    <path d="M 2 -25 Q -8 10 -5 70 Q 0 85 8 88"
          fill="none" stroke="#5a8c5a" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>

    <!-- Right side leaf back -->
    <path d="M 5 0 Q 60 20 68 90"
          fill="none" stroke="#7ab77a" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Subtle shadow under vase -->
  <ellipse cx="300" cy="820" rx="80" ry="8" fill="#000" opacity="0.08"/>
</svg>
