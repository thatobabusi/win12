<svg viewBox="0 0 1920 1200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="softBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" />
    </filter>
  </defs>

  <!-- Clean white background -->
  <rect width="1920" height="1200" fill="#ffffff"/>

  <!-- Subtle light gray gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1920" height="1200" fill="url(#bgGradient)"/>

  <!-- Minimalist calla lily on right side -->
  <g opacity="0.4" transform="translate(1600, 300)">
    <!-- Stem -->
    <line x1="0" y1="0" x2="0" y2="400" stroke="#7a9d6f" stroke-width="3" stroke-linecap="round"/>

    <!-- Calla lily flower -->
    <path d="M 0 0 Q -40 -20 -50 -80 Q -45 -120 0 -130 Q 45 -120 50 -80 Q 40 -20 0 0"
          fill="none" stroke="#8db980" stroke-width="2.5" filter="url(#softBlur)"/>
    <path d="M 0 0 Q -35 -15 -45 -75 Q -40 -110 0 -120 Q 40 -110 45 -75 Q 35 -15 0 0"
          fill="#9dc989" opacity="0.6"/>
  </g>

  <!-- Minimalist leaf on left side -->
  <g opacity="0.35" transform="translate(200, 400)">
    <!-- Stem -->
    <line x1="0" y1="0" x2="0" y2="350" stroke="#7a9d6f" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Leaf shape -->
    <path d="M 0 0 Q -45 10 -60 80 Q -50 130 0 150 Q 50 130 60 80 Q 45 10 0 0"
          fill="#a8d5a8" opacity="0.7"/>
    <path d="M 0 0 Q -45 10 -60 80 Q -50 130 0 150 Q 50 130 60 80 Q 45 10 0 0"
          fill="none" stroke="#7a9d6f" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Very subtle accent leaf in bottom right -->
  <g opacity="0.2" transform="translate(1700, 900)">
    <path d="M 0 0 Q -30 5 -40 50 Q -35 75 0 85 Q 35 75 40 50 Q 30 5 0 0"
          fill="#b0d9b0" opacity="0.5"/>
  </g>

  <!-- Subtle top-left accent -->
  <g opacity="0.15" transform="translate(100, 150)">
    <circle cx="0" cy="0" r="80" fill="#c8e6c9"/>
  </g>

  <!-- Very light bottom accent -->
  <rect width="1920" height="200" y="1000" fill="url(#bgGradient)" opacity="0.3"/>
</svg>
