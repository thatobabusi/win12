<!DOCTYPE html>
<html lang="en" style="height:100%;">
<head>
    <!-- theme-ubuntu: Plymouth-style restart screen (orange spinner, wordmark). -->
    <style>
        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 0;
            margin: 0;
            font-family: 'Ubuntu', 'Segoe UI', system-ui, sans-serif;
        }

        .wordmark {
            color: #fff;
            font-size: 34px;
            font-weight: 300;
            letter-spacing: -1px;
            margin-bottom: 26px;
        }

        loading>svg>circle:first-child {
            stroke: #E95420;
            fill: none;
            stroke-width: 2px;
            stroke-linecap: round;
            animation: spin-infinite 2.5s linear 0s infinite normal none running;
            transform-origin: 50% 50%;
        }

        loading>svg>circle:last-child {
            fill: #00000000
        }

        loading>svg {
            background-color: #00000000;
            border-radius: 50%
        }

        @keyframes spin-infinite {
            0% {
                stroke-dasharray: .01px, 43.97px;
                transform: rotate(0deg)
            }

            50% {
                stroke-dasharray: 21.99px, 21.99px;
                transform: rotate(450deg)
            }

            to {
                stroke-dasharray: .01px, 43.97px;
                transform: rotate(3turn)
            }
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restarting...</title>
</head>
<body onload="
setTimeout(()=>{
    location.href='boot.html';
},3000);">
    <div class="wordmark">ubuntu</div>
    <loading id="ld">
        <svg width="50px" height="50px" viewBox="0 0 16 16">
            <circle cx="8px" cy="8px" r="7px"></circle>
            <circle cx="8px" cy="8px" r="6px"></circle>
        </svg>
    </loading>
    <p id="ldt" style="text-align:center;color:#aea79f;font-size:18px;margin-top:14px">
        Restarting
    </p>
</body>
</html>
