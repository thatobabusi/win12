<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>macOS Boot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- theme-mac: macOS Sequoia-style boot screen with glossy design -->
    <style>
        html {
            background: linear-gradient(135deg, #f5f5f7 0%, #e8e8ed 100%);
        }

        * {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            border: 0;
            user-select: none;
            scrollbar-width: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -o-user-select: none;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        body {
            background: linear-gradient(135deg, #f5f5f7 0%, #e8e8ed 100%);
            color: #000;
            cursor: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .boot-container {
            text-align: center;
        }

        .boot-logo {
            font-size: 72px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .boot-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .progress-bar {
            width: 300px;
            height: 3px;
            background: linear-gradient(90deg, #007AFF, #5856D6);
            border-radius: 2px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        #load {
            height: 100%;
            background: linear-gradient(90deg, #007AFF, #5856D6);
            border-radius: 2px;
            animation: progress 2s ease-in-out infinite;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 100%; }
        }

        #info {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body id="body" scroll="no">
    <div class="boot-container">
        <div class="boot-logo">🍎</div>
        <div class="boot-text">macOS Boot</div>
        <div class="loading">
            <div class="progress-bar">
                <div id="load"></div>
            </div>
        </div>
    </div>
    <div id="info">
        <p>Press F2 or touch screen to enter SETUP</p>
    </div>
    <script src="./scripts/jq.min.js"></script>
    <script src="./scripts/boot_kernel.js"></script>
</body>
</html>
