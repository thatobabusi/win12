<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>macOS Boot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- theme-mac: macOS Sequoia-style boot screen with glossy design -->
    <style>
        html {
            background-image: url('assets/images/macos-boot-dark.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        :root.dark {
            background-image: url('assets/images/macos-boot-dark.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        * {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            border: 0;
            user-select: none;
            scrollbar-width: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -o-user-select: none;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        body {
            background-image: url('assets/images/macos-boot-dark.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            cursor: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .boot-container {
            text-align: center;
        }

        .boot-logo {
            display: none;
        }

        .boot-text {
            display: none;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .progress-bar {
            width: 300px;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
        }

        #load {
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 0;
            animation: progress 2s ease-in-out infinite;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 100%; }
        }

        #info {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body id="body" scroll="no">
    <div class="boot-container">
        <div class="boot-logo">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M 83.1 65.7 C 83.1 75.5 77.2 82.7 68.7 82.7 C 64.1 82.7 60.2 80.8 57.6 77.8 C 55.7 80.8 51.9 82.7 47.6 82.7 C 38.2 82.7 32.4 75.5 32.4 65.7 C 32.4 54.5 39.3 45.8 51.5 40.2 C 54.5 35.7 57.4 30.8 57.4 26.2 C 57.4 17.1 50.5 10.2 41.4 10.2 C 35.6 10.2 30.4 13.3 27.5 18.1 C 24.7 22.6 23.8 28.5 23.8 35.2 L 18.2 35.2 C 18.2 26.8 19.4 19.6 22.9 13.9 C 26.4 8.2 33.3 4.1 41.4 4.1 C 54.6 4.1 64.3 14.0 64.3 26.2 C 64.3 32.2 61.6 37.5 58.2 42.5 C 48.7 47.3 42.8 54.4 42.8 65.7 C 42.8 71.4 46.7 76.2 52.4 76.2 C 57.0 76.2 60.7 73.2 61.4 69.1 L 67.2 69.1 C 67.9 73.2 71.6 76.2 76.2 76.2 C 81.9 76.2 85.8 71.4 85.8 65.7 L 83.1 65.7 Z" fill="currentColor" stroke="none"/>
                <circle cx="85" cy="20" r="8" fill="currentColor"/>
            </svg>
        </div>
        <div class="boot-text">macOS Boot</div>
        <div class="loading">
            <div class="progress-bar">
                <div id="load"></div>
            </div>
        </div>
    </div>
    <div id="info">
        <p>Press F2 or touch screen to enter SETUP</p>
    </div>
    <script src="./scripts/jq.min.js"></script>
    <script src="./scripts/boot_kernel.js"></script>
</body>
</html>
