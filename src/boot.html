<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Windows 12 Web Version</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- theme-ubuntu: Plymouth-style boot splash. Text wordmark + CSS dots only —
         no Canonical logo assets (they're trademarked); the Ubuntu font is used
         when installed locally, otherwise the system sans. boot_kernel.js is
         unchanged: it animates #load/#back widths (400px total) and F2 -> BIOS. -->
    <style>
        html {
            background-color: #000000;
        }

        * {
            font-family: 'Ubuntu', 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            border: 0;
            user-select: none;
            scrollbar-width: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -o-user-select: none;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        body {
            background-color: black;
            color: white;
            cursor: none;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .plymouth {
            text-align: center;
        }

        .wordmark {
            font-size: 46px;
            font-weight: 300;
            letter-spacing: -1px;
            color: #fff;
        }

        .remix {
            font-size: 12px;
            color: #aea79f;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .dots {
            margin-top: 28px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .dots span {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #4d4d4d;
            animation: dotpulse 1.6s infinite;
        }

        .dots span:nth-child(2) { animation-delay: .2s; }
        .dots span:nth-child(3) { animation-delay: .4s; }
        .dots span:nth-child(4) { animation-delay: .6s; }

        @keyframes dotpulse {
            0%, 60%, 100% { background: #4d4d4d; }
            30% { background: #E95420; }
        }

        /* restyled from the old grey blocks into a thin progress line */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 22px;
        }

        #load { background-color: #E95420; height: 2px; border-radius: 1px; }
        #back { background-color: #2b2b2b; height: 2px; border-radius: 1px; }

        #info {
            position: absolute;
            bottom: 14px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #6e6e6e;
        }
    </style>
</head>

<body id="body" scroll="no">
    <div class="plymouth">
        <div class="wordmark">ubuntu</div>
        <div class="remix">win12 remix</div>
        <div class="loading">
            <div id="load" style="width: 0px;"></div>
            <div id="back" style="width: 400px;"></div>
        </div>
        <div class="dots"><span></span><span></span><span></span><span></span></div>
    </div>
    <div id="info">
        <p>Press F2 or touch screen to enter SETUP</p>
    </div>
    <script src="./scripts/jq.min.js"></script>
    <script src="./scripts/boot_kernel.js"></script>
</body>
</html>
