name: Test & Quality (Node)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run

      - name: Generate coverage report
        run: npm run test:coverage -- --run
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: always()
    steps:
      - name: Check test results
        run: |
          LINT="${{ needs.lint.result }}"
          UNIT="${{ needs.unit-tests.result }}"

          if [ "$LINT" = "failure" ] || [ "$UNIT" = "failure" ]; then
            echo "❌ Tests failed!"
            exit 1
          fi

          echo "✅ All tests passed!"

  pr-comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.event_name == 'pull_request' && always()
    permissions:
      pull-requests: write
    steps:
      - name: PR Status Comment
        uses: actions/github-script@v7
        with:
          script: |
            const lint = '${{ needs.lint.result }}' === 'success' ? '✅' : '❌';
            const unit = '${{ needs.unit-tests.result }}' === 'success' ? '✅' : '❌';

            const status = lint === '✅' && unit === '✅' ? '✅ Ready to merge' : '❌ Fix issues to proceed';

            const comment = `## Test Results

            | Check | Status |
            |-------|--------|
            | Linting | ${lint} |
            | Unit Tests | ${unit} |

            **Status:** ${status}

            *For E2E testing: \`docker-compose run --rm test-e2e\` or \`npm run test:e2e\` locally*

            [View workflow logs](${context.payload.pull_request.html_url}/checks)`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
