name: Test (Docker)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build & Test with Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t win12-tests .

      - name: Run unit tests
        run: docker run --rm win12-tests npm test -- --run

      - name: Run linting
        run: docker run --rm win12-tests npm run lint

      - name: Test Summary
        run: |
          echo "✅ Docker tests completed successfully"
          echo "✅ Unit tests: PASS"
          echo "✅ Linting: PASS"
          echo ""
          echo "ℹ️  E2E tests run locally:"
          echo "   docker-compose run --rm test-e2e"
